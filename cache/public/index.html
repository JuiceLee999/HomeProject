<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CACHE — Inventory</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050807">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #080c09;
  --paper:        #0e1510;
  --ink:          #b4e8b0;
  --muted:        #4a7050;
  --rule:         #1a3020;
  --accent:       #22d45a;
  --accent-dim:   #0a2010;
  --amber:        #d4a020;
  --amber-dim:    #1c1404;
  --red:          #d44020;
  --red-dim:      #200808;
  --blue:         #20c4d4;
  --blue-dim:     #081c20;
  --panel-w:      460px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Share Tech Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

/* ── AUTH ── */
.auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 600; display: flex; align-items: center; justify-content: center; }
.auth-card { background: var(--paper); border: 1px solid var(--rule); border-top: 3px solid var(--accent); width: 360px; max-width: 95vw; padding: 32px; }
.auth-logo { font-size: 26px; letter-spacing: 4px; color: var(--accent); margin-bottom: 2px; }
.auth-logomark { color: var(--muted); }
.auth-sub { font-size: 9px; letter-spacing: 3px; color: var(--muted); margin-bottom: 28px; }
.auth-tabs { display: flex; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
.auth-tab { flex: 1; background: none; border: none; color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; padding: 8px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; }
.auth-field input { width: 100%; background: var(--bg); border: 1px solid var(--rule); padding: 9px 11px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color 0.15s; }
.auth-field input:focus { border-color: var(--accent); }
.btn-auth { width: 100%; background: var(--accent); color: var(--bg); border: none; padding: 11px; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
.btn-auth:hover { opacity: 0.85; }
.btn-auth:disabled { opacity: 0.45; cursor: default; }
.auth-err { font-size: 11px; color: var(--red); margin-top: 10px; min-height: 16px; letter-spacing: 0.5px; }

/* ── HEADER ── */
header { background: #050807; border-bottom: 2px solid var(--accent); padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 200; }
.header-logo { font-size: 20px; letter-spacing: 4px; color: var(--accent); white-space: nowrap; flex-shrink: 0; }
.header-logo span { color: var(--muted); }
.header-stats { display: flex; gap: 20px; margin-left: 16px; flex: 1; }
.hstat { font-size: 10px; letter-spacing: 1px; color: var(--muted); white-space: nowrap; }
.hstat strong { color: var(--ink); }
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.btn-icon { background: none; border: 1px solid var(--rule); color: var(--muted); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all 0.15s; flex-shrink: 0; font-family: 'Share Tech Mono', monospace; }
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
.btn-scan-header { background: var(--accent); color: var(--bg); border: none; padding: 6px 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; white-space: nowrap; }
.btn-scan-header:hover { opacity: 0.85; }

/* ── MAIN ── */
main { max-width: 1100px; margin: 0 auto; padding: 20px 20px 80px; transition: padding-right 0.35s ease; }
body.panel-open main { padding-right: calc(var(--panel-w) + 20px); }

/* ── SEARCH + FILTER BAR ── */
.search-bar { display: flex; gap: 8px; align-items: center; background: var(--paper); border: 1px solid var(--rule); padding: 8px 12px; margin-bottom: 12px; }
.search-prompt { color: var(--accent); font-size: 13px; flex-shrink: 0; }
.search-input { flex: 1; background: transparent; border: none; outline: none; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--ink); caret-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-clear { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0; transition: color 0.15s; line-height: 1; }
.search-clear:hover { color: var(--red); }
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-chip { background: none; border: 1px solid var(--rule); color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; }
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.filter-select { background: var(--paper); border: 1px solid var(--rule); color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 8px; outline: none; cursor: pointer; }
.filter-select:focus { border-color: var(--accent); color: var(--ink); }
.filter-sep { width: 1px; height: 18px; background: var(--rule); flex-shrink: 0; }
.sort-label { font-size: 10px; letter-spacing: 1px; color: var(--muted); white-space: nowrap; }

/* ── ITEM GRID ── */
.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.item-card {
  background: var(--paper); border: 1px solid var(--rule); border-left: 3px solid var(--muted);
  padding: 14px; cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  animation: fadeIn 0.2s ease both;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.item-card:hover { border-left-color: var(--accent); transform: translateY(-1px); }
.item-card.selected { border-left-color: var(--accent); background: #111a12; }
.item-card[data-cond="new"]  { border-left-color: var(--accent); }
.item-card[data-cond="good"] { border-left-color: var(--accent); }
.item-card[data-cond="fair"] { border-left-color: var(--amber); }
.item-card[data-cond="poor"] { border-left-color: var(--red); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 10px; }
.card-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.badge { font-size: 9px; letter-spacing: 1px; padding: 2px 7px; border: 1px solid; text-transform: uppercase; flex-shrink: 0; }
.badge-cat  { border-color: var(--rule); color: var(--muted); }
.badge-cond-new, .badge-cond-good { border-color: var(--accent); color: var(--accent); }
.badge-cond-fair { border-color: var(--amber); color: var(--amber); }
.badge-cond-poor { border-color: var(--red); color: var(--red); }
.card-id { font-size: 9px; color: var(--rule); flex-shrink: 0; }
.card-name { font-size: 15px; letter-spacing: 0.5px; color: #e0f8dc; margin-bottom: 3px; line-height: 1.3; }
.card-brand { font-size: 10px; color: var(--muted); margin-bottom: 10px; }
.card-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; margin-bottom: 8px; }
.card-qty { color: var(--ink); }
.card-val { color: var(--amber); }
.card-loc { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.card-actions { display: flex; gap: 6px; margin-top: 10px; border-top: 1px solid var(--rule); padding-top: 10px; }
.btn-card-qr { background: none; border: 1px solid var(--rule); color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; }
.btn-card-qr:hover { border-color: var(--accent); color: var(--accent); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
.empty-msg { font-size: 12px; letter-spacing: 2px; }

/* ── FAB ── */
.fab { position: fixed; bottom: 28px; right: 28px; background: var(--accent); color: var(--bg); border: none; width: 54px; height: 54px; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 150; box-shadow: 0 4px 20px rgba(34,212,90,0.35); transition: all 0.15s; line-height: 1; }
.fab:hover { opacity: 0.85; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(34,212,90,0.45); }
body.panel-open .fab { right: calc(var(--panel-w) + 28px); }

/* ── PANEL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,5,3,0.55); z-index: 299; }
body.panel-open .overlay { display: block; }
.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: var(--panel-w);
  background: var(--paper); border-left: 2px solid var(--accent); z-index: 300;
  overflow-y: auto; transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
body.panel-open .detail-panel { transform: translateX(0); }
.panel-header { background: #050807; padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 10; }
.panel-header-title { flex: 1; font-size: 11px; letter-spacing: 3px; color: var(--muted); }
.panel-header-title span { color: var(--accent); }
.btn-close-panel { background: none; border: 1px solid var(--rule); color: var(--muted); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; transition: all 0.15s; flex-shrink: 0; }
.btn-close-panel:hover { border-color: var(--red); color: var(--red); }
.panel-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.panel-field label { display: block; font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
.panel-field input, .panel-field select, .panel-field textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--rule); padding: 8px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none;
  transition: border-color 0.15s; resize: vertical;
}
.panel-field input:focus, .panel-field select:focus, .panel-field textarea:focus { border-color: var(--accent); }
.panel-field textarea { min-height: 70px; }
.panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.panel-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
.panel-divider { height: 1px; background: var(--rule); margin: 0 -16px; }
.panel-section { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
/* Tags */
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.tag-chip { background: var(--accent-dim); border: 1px solid var(--rule); color: var(--accent); font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.5px; padding: 3px 8px; display: flex; align-items: center; gap: 5px; }
.tag-chip-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0; line-height: 1; transition: color 0.15s; }
.tag-chip-del:hover { color: var(--red); }
.tag-input-wrap { display: flex; gap: 6px; }
.tag-input { flex: 1; background: var(--bg); border: 1px solid var(--rule); padding: 5px 8px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--ink); outline: none; }
.tag-input:focus { border-color: var(--accent); }
.btn-tag-add { background: none; border: 1px solid var(--rule); color: var(--muted); padding: 4px 10px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-tag-add:hover { border-color: var(--accent); color: var(--accent); }
/* QR in panel */
.panel-qr-wrap { background: var(--bg); border: 1px solid var(--rule); padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.panel-qr-wrap img { width: 160px; height: 160px; display: block; }
.panel-qr-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); }
.panel-qr-new { font-size: 11px; letter-spacing: 1px; color: var(--muted); padding: 20px 0; }
/* Panel footer */
.panel-footer { padding: 12px 16px; border-top: 1px solid var(--rule); display: flex; gap: 8px; position: sticky; bottom: 0; background: var(--paper); }
.btn-save { flex: 1; background: var(--accent); color: var(--bg); border: none; padding: 9px; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: opacity 0.15s; }
.btn-save:hover { opacity: 0.85; }
.btn-delete-item { background: none; border: 1px solid var(--red); color: var(--red); padding: 8px 12px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.btn-delete-item:hover { background: var(--red); color: var(--bg); }
.btn-show-qr-panel { background: none; border: 1px solid var(--rule); color: var(--muted); padding: 8px 12px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.btn-show-qr-panel:hover { border-color: var(--accent); color: var(--accent); }
.save-flash { font-size: 11px; color: var(--accent); letter-spacing: 1px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; align-self: center; }
.save-flash.show { opacity: 1; }

/* ── QR MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,5,3,0.75); z-index: 400; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.qr-modal { background: var(--paper); border: 1px solid var(--rule); border-top: 2px solid var(--accent); width: 320px; max-width: 95vw; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.qr-modal-name { font-size: 16px; letter-spacing: 1px; color: var(--ink); text-align: center; }
.qr-modal-loc { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-align: center; }
.qr-img-wrap { background: var(--bg); border: 1px solid var(--rule); padding: 12px; }
.qr-img-wrap img { width: 220px; height: 220px; display: block; }
.qr-modal-actions { display: flex; gap: 8px; width: 100%; }
.btn-qr-print { flex: 1; background: var(--accent); color: var(--bg); border: none; padding: 9px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: opacity 0.15s; }
.btn-qr-print:hover { opacity: 0.85; }
.btn-qr-close { background: none; border: 1px solid var(--rule); color: var(--muted); padding: 8px 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.btn-qr-close:hover { border-color: var(--red); color: var(--red); }

/* ── SCANNER MODAL ── */
.scanner-modal { background: #020504; border: 1px solid var(--rule); border-top: 2px solid var(--accent); width: 380px; max-width: 95vw; display: flex; flex-direction: column; align-items: center; gap: 0; overflow: hidden; }
.scanner-header { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 12px 16px; border-bottom: 1px solid var(--rule); }
.scanner-title { font-size: 12px; letter-spacing: 3px; color: var(--accent); }
.scanner-viewport { position: relative; width: 100%; aspect-ratio: 1; background: #000; overflow: hidden; }
#scanner-video { width: 100%; height: 100%; object-fit: cover; display: block; }
#scanner-canvas { display: none; }
.scanner-overlay { position: absolute; inset: 0; pointer-events: none; }
.scanner-corner { position: absolute; width: 24px; height: 24px; border-color: var(--accent); border-style: solid; border-width: 0; }
.scanner-corner.tl { top: 16px; left: 16px; border-top-width: 2px; border-left-width: 2px; }
.scanner-corner.tr { top: 16px; right: 16px; border-top-width: 2px; border-right-width: 2px; }
.scanner-corner.bl { bottom: 16px; left: 16px; border-bottom-width: 2px; border-left-width: 2px; }
.scanner-corner.br { bottom: 16px; right: 16px; border-bottom-width: 2px; border-right-width: 2px; }
.scanner-line { position: absolute; left: 16px; right: 16px; height: 1px; background: var(--accent); animation: scanline 2s ease-in-out infinite; opacity: 0.7; }
@keyframes scanline { 0%,100% { top: 20px; } 50% { top: calc(100% - 20px); } }
.scanner-status { width: 100%; padding: 12px 16px; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-align: center; border-top: 1px solid var(--rule); }
.scanner-status.detected { color: var(--accent); }
.btn-scan-cancel { margin: 0; width: 100%; background: none; border: none; border-top: 1px solid var(--rule); color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; padding: 12px; cursor: pointer; transition: color 0.15s; }
.btn-scan-cancel:hover { color: var(--red); }

/* ── USER MENU MODAL ── */
.user-modal { background: var(--paper); border: 1px solid var(--rule); border-top: 2px solid var(--accent); width: 340px; max-width: 95vw; }
.user-modal-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); font-size: 10px; letter-spacing: 2px; color: var(--muted); }
.user-modal-email { color: var(--ink); }
.user-modal-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.user-action-btn { background: none; border: 1px solid var(--rule); color: var(--muted); padding: 9px 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; text-align: left; width: 100%; }
.user-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.user-action-btn.danger { border-color: var(--rule); color: var(--muted); }
.user-action-btn.danger:hover { border-color: var(--red); color: var(--red); }
.user-modal-field { display: flex; flex-direction: column; gap: 5px; }
.user-modal-field label { font-size: 9px; letter-spacing: 2px; color: var(--muted); }
.user-modal-field input { background: var(--bg); border: 1px solid var(--rule); padding: 8px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; }
.user-modal-field input:focus { border-color: var(--accent); }
.user-modal-msg { font-size: 11px; min-height: 14px; letter-spacing: 0.5px; }
.user-modal-msg.ok  { color: var(--accent); }
.user-modal-msg.err { color: var(--red); }

@media (max-width: 640px) {
  :root { --panel-w: 100vw; }
  .header-stats { display: none; }
  .detail-panel { width: 100%; border-left: none; border-top: 2px solid var(--accent); top: auto; bottom: 0; height: 85vh; transform: translateY(100%); }
  body.panel-open .detail-panel { transform: translateY(0); }
  body.panel-open main { padding-right: 20px; }
  body.panel-open .fab { display: none; }
  .panel-row { grid-template-columns: 1fr; }
  .panel-row-3 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<script>/* prevent flash */</script>

<!-- ══ AUTH ══ -->
<div class="auth-screen" id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo"><span class="auth-logomark">▌▌ </span>CACHE</div>
    <div class="auth-sub">INVENTORY SYSTEM</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">SIGN IN</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div class="auth-field">
      <label>EMAIL</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label>PASSWORD</label>
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <div class="auth-field" id="auth-confirm-wrap" style="display:none">
      <label>CONFIRM PASSWORD</label>
      <input type="password" id="auth-confirm" placeholder="Repeat password" autocomplete="new-password" />
    </div>
    <button class="btn-auth" id="btn-auth" onclick="authSubmit()">ACCESS SYSTEM →</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- ══ QR MODAL ══ -->
<div class="modal-overlay" id="qr-modal">
  <div class="qr-modal" onclick="event.stopPropagation()">
    <div class="qr-modal-name" id="qr-name"></div>
    <div class="qr-modal-loc" id="qr-loc"></div>
    <div class="qr-img-wrap">
      <img id="qr-img" src="" alt="QR Code" />
    </div>
    <div class="qr-modal-actions">
      <button class="btn-qr-print" onclick="printQRLabel()">⬡ PRINT LABEL</button>
      <button class="btn-qr-close" onclick="closeQR()">CLOSE</button>
    </div>
  </div>
</div>

<!-- ══ SCANNER MODAL ══ -->
<div class="modal-overlay" id="scanner-modal">
  <div class="scanner-modal" onclick="event.stopPropagation()">
    <div class="scanner-header">
      <span class="scanner-title">▌ QR SCAN</span>
      <button class="btn-icon" onclick="closeScanner()">✕</button>
    </div>
    <div class="scanner-viewport">
      <video id="scanner-video" autoplay playsinline muted></video>
      <canvas id="scanner-canvas"></canvas>
      <div class="scanner-overlay">
        <div class="scanner-corner tl"></div>
        <div class="scanner-corner tr"></div>
        <div class="scanner-corner bl"></div>
        <div class="scanner-corner br"></div>
        <div class="scanner-line"></div>
      </div>
    </div>

<script src="/lib/jsqr.js"></script>
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('cache_token') || '';
let currentUserEmail = '';
let items = [];
let currentSearch = '';
let currentFilter = 'all';
let currentCatFilter = '';
let currentLocFilter = '';
let currentSort = 'modified';
let openItemId = null;
let panelMode = 'add'; // 'add' | 'edit'
let itemTags = [];
let scannerStream = null;
let qrItemId = null;

// ── API helper ────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let authMode = 'login';

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('auth-confirm-wrap').style.display = mode === 'register' ? '' : 'none';
  document.getElementById('btn-auth').textContent = mode === 'login' ? 'ACCESS SYSTEM →' : 'CREATE ACCOUNT →';
  document.getElementById('auth-err').textContent = '';
}

async function authSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const confirm = document.getElementById('auth-confirm').value;
  const errEl = document.getElementById('auth-err');
  const btn = document.getElementById('btn-auth');

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email and password required.'; return; }
  if (authMode === 'register' && password !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }

  btn.disabled = true;
  try {
    const path = authMode === 'login' ? '/api/login' : '/api/register';
    const data = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    }).then(r => r.json());

    if (data.error) { errEl.textContent = data.error; return; }
    token = data.token;
    currentUserEmail = data.email;
    localStorage.setItem('cache_token', token);
    showApp();
    await loadItems();
  } catch (e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('app-main').style.display = 'none';
  document.getElementById('fab').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-main').style.display = 'block';
  document.getElementById('fab').style.display = 'flex';
  document.getElementById('user-email-display').textContent = currentUserEmail;
}

async function doLogout() {
  closeUserModal();
  try { await api('POST', '/api/logout'); } catch {}
  token = '';
  localStorage.removeItem('cache_token');
  items = [];
  showAuthScreen();
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadItems() {
  try {
    items = await api('GET', '/api/items');
    render();
  } catch (e) {
    if (e.message === 'Unauthorized' || e.message === 'Token revoked') {
      token = '';
      localStorage.removeItem('cache_token');
      showAuthScreen();
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  updateHeaderStats();
  updateFilterSelects();
  renderGrid();
}

function updateHeaderStats() {
  document.getElementById('hs-items').textContent = items.length;
  const totalVal = items.reduce((s, i) => s + (Number(i.value) || 0) * (Number(i.quantity) || 1), 0);
  document.getElementById('hs-value').textContent = '$' + totalVal.toLocaleString('en-US', { maximumFractionDigits: 0 });
  const locs = new Set(items.map(i => i.location).filter(Boolean));
  document.getElementById('hs-locs').textContent = locs.size;
}

function updateFilterSelects() {
  const cats = [...new Set(items.map(i => i.category).filter(Boolean))].sort();
  const locs = [...new Set(items.map(i => i.location).filter(Boolean))].sort();

  const catSel = document.getElementById('cat-filter');
  const curCat = catSel.value;
  catSel.innerHTML = '<option value="">ALL CATEGORIES</option>' +
    cats.map(c => `<option${c === curCat ? ' selected' : ''}>${escHtml(c)}</option>`).join('');

  const locSel = document.getElementById('loc-filter');
  const curLoc = locSel.value;
  locSel.innerHTML = '<option value="">ALL LOCATIONS</option>' +
    locs.map(l => `<option${l === curLoc ? ' selected' : ''}>${escHtml(l)}</option>`).join('');

  // Datalist for location input
  const dl = document.getElementById('loc-suggestions');
  dl.innerHTML = locs.map(l => `<option value="${escHtml(l)}">`).join('');
}

function getFiltered() {
  let list = [...items];

  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.description || '').toLowerCase().includes(q) ||
      (i.category || '').toLowerCase().includes(q) ||
      (i.location || '').toLowerCase().includes(q) ||
      (i.brand || '').toLowerCase().includes(q) ||
      (i.model || '').toLowerCase().includes(q) ||
      (i.serial || '').toLowerCase().includes(q) ||
      (i.notes || '').toLowerCase().includes(q) ||
      (Array.isArray(i.tags) ? i.tags.join(' ') : '').toLowerCase().includes(q)
    );
  }

  if (currentFilter.startsWith('cond:')) {
    const cond = currentFilter.slice(5);
    list = list.filter(i => i.condition === cond);
  }
  if (currentCatFilter) list = list.filter(i => i.category === currentCatFilter);
  if (currentLocFilter) list = list.filter(i => i.location === currentLocFilter);

  list.sort((a, b) => {
    if (currentSort === 'name')     return a.name.localeCompare(b.name);
    if (currentSort === 'value')    return (Number(b.value)||0) - (Number(a.value)||0);
    if (currentSort === 'qty')      return (Number(b.quantity)||0) - (Number(a.quantity)||0);
    if (currentSort === 'created')  return (b.created_at||0) - (a.created_at||0);
    return (b.modified_at||0) - (a.modified_at||0);
  });

  return list;
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('item-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">▣</div>
      <div class="empty-msg">${currentSearch || currentFilter !== 'all' || currentCatFilter || currentLocFilter ? 'NO ITEMS MATCH' : 'NO ITEMS YET — HIT + TO ADD'}</div>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(itemCardHTML).join('');
}

function itemCardHTML(item) {
  const val = Number(item.value) || 0;
  const valStr = val > 0 ? '$' + val.toLocaleString('en-US', { minimumFractionDigits: 2 }) : '';
  const brand = [item.brand, item.model].filter(Boolean).join(' / ');
  const selected = item.id === openItemId ? ' selected' : '';
  const condClass = `badge-cond-${item.condition || 'good'}`;
  const condLabel = (item.condition || 'good').toUpperCase();

  return `<div class="item-card${selected}" data-cond="${escHtml(item.condition)}" data-card-id="${item.id}">
    <div class="card-top">
      <div class="card-badges">
        ${item.category ? `<span class="badge badge-cat">${escHtml(item.category)}</span>` : ''}
        <span class="badge ${condClass}">${condLabel}</span>
      </div>
      <span class="card-id">#${String(item.id).padStart(4,'0')}</span>
    </div>
    <div class="card-name">${escHtml(item.name)}</div>
    ${brand ? `<div class="card-brand">${escHtml(brand)}</div>` : ''}
    <div class="card-meta">
      <span class="card-qty">${item.quantity} ${escHtml(item.unit)}</span>
      ${valStr ? `<span class="card-val">${escHtml(valStr)}</span>` : ''}
    </div>
    ${item.location ? `<div class="card-loc">⊹ ${escHtml(item.location)}</div>` : ''}
    <div class="card-actions">
      <button class="btn-card-qr" data-qr-id="${item.id}" onclick="event.stopPropagation();showQR(${item.id})">⊡ QR CODE</button>
    </div>
  </div>`;
}

// ── Panel ─────────────────────────────────────────────────────────────────────
function openAddPanel() {
  panelMode = 'add';
  openItemId = null;
  itemTags = [];
  document.getElementById('panel-mode-label').innerHTML = '<span>▌</span> ADD ITEM';
  document.getElementById('pd-name').value = '';
  document.getElementById('pd-category').value = '';
  document.getElementById('pd-condition').value = 'good';
  document.getElementById('pd-location').value = '';
  document.getElementById('pd-qty').value = '1';
  document.getElementById('pd-unit').value = 'pcs';
  document.getElementById('pd-value').value = '';
  document.getElementById('pd-brand').value = '';
  document.getElementById('pd-model').value = '';
  document.getElementById('pd-serial').value = '';
  document.getElementById('pd-description').value = '';
  document.getElementById('pd-notes').value = '';
  document.getElementById('tag-input').value = '';
  document.getElementById('panel-qr-section').style.display = 'none';
  document.getElementById('btn-qr-panel').style.display = 'none';
  document.getElementById('btn-delete-item').style.display = 'none';
  renderTagsWrap();
  document.body.classList.add('panel-open');
  setTimeout(() => document.getElementById('pd-name').focus(), 320);
}

function openPanel(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  panelMode = 'edit';
  openItemId = id;
  itemTags = Array.isArray(item.tags) ? [...item.tags] : [];

  document.getElementById('panel-mode-label').innerHTML = `<span>▌</span> EDIT #${String(id).padStart(4,'0')}`;
  document.getElementById('pd-name').value = item.name;
  document.getElementById('pd-category').value = item.category || '';
  document.getElementById('pd-condition').value = item.condition || 'good';
  document.getElementById('pd-location').value = item.location || '';
  document.getElementById('pd-qty').value = item.quantity;
  document.getElementById('pd-unit').value = item.unit || 'pcs';
  document.getElementById('pd-value').value = item.value || '';
  document.getElementById('pd-brand').value = item.brand || '';
  document.getElementById('pd-model').value = item.model || '';
  document.getElementById('pd-serial').value = item.serial || '';
  document.getElementById('pd-description').value = item.description || '';
  document.getElementById('pd-notes').value = item.notes || '';
  document.getElementById('tag-input').value = '';

  // Show QR
  document.getElementById('panel-qr-section').style.display = '';
  document.getElementById('panel-qr-img').src = `/api/items/${id}/qr?t=${Date.now()}`;
  document.getElementById('btn-qr-panel').style.display = '';
  document.getElementById('btn-delete-item').style.display = '';

  renderTagsWrap();
  document.body.classList.add('panel-open');

  // Highlight card
  document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-card-id="${id}"]`);
  if (card) card.classList.add('selected');
}

function closePanel() {
  document.body.classList.remove('panel-open');
  document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
  openItemId = null;
}

async function saveItem() {
  const name = document.getElementById('pd-name').value.trim();
  if (!name) { document.getElementById('pd-name').focus(); return; }

  const body = {
    name,
    category:    document.getElementById('pd-category').value,
    condition:   document.getElementById('pd-condition').value,
    location:    document.getElementById('pd-location').value.trim(),
    quantity:    Number(document.getElementById('pd-qty').value) || 1,
    unit:        document.getElementById('pd-unit').value,
    value:       Number(document.getElementById('pd-value').value) || 0,
    brand:       document.getElementById('pd-brand').value.trim(),
    model:       document.getElementById('pd-model').value.trim(),
    serial:      document.getElementById('pd-serial').value.trim(),
    description: document.getElementById('pd-description').value.trim(),
    notes:       document.getElementById('pd-notes').value.trim(),
    tags:        itemTags,
  };

  try {
    let saved;
    if (panelMode === 'add') {
      saved = await api('POST', '/api/items', body);
      items.unshift(saved);
      openItemId = saved.id;
      panelMode = 'edit';
      document.getElementById('panel-mode-label').innerHTML = `<span>▌</span> EDIT #${String(saved.id).padStart(4,'0')}`;
      document.getElementById('panel-qr-section').style.display = '';
      document.getElementById('panel-qr-img').src = `/api/items/${saved.id}/qr?t=${Date.now()}`;
      document.getElementById('btn-qr-panel').style.display = '';
      document.getElementById('btn-delete-item').style.display = '';
    } else {
      saved = await api('PUT', `/api/items/${openItemId}`, body);
      const idx = items.findIndex(i => i.id === openItemId);
      if (idx !== -1) items[idx] = saved;
    }
    render();
    flashSaved();
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
}

async function deleteCurrentItem() {
  if (!openItemId) return;
  if (!confirm('Delete this item? This cannot be undone.')) return;
  try {
    await api('DELETE', `/api/items/${openItemId}`);
    items = items.filter(i => i.id !== openItemId);
    closePanel();
    render();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

function flashSaved() {
  const el = document.getElementById('save-flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function renderTagsWrap() {
  const wrap = document.getElementById('tags-wrap');
  wrap.innerHTML = itemTags.map((t, i) =>
    `<span class="tag-chip">${escHtml(t)}<button class="tag-chip-del" onclick="removeTag(${i})">×</button></span>`
  ).join('');
}

function addTag() {
  const inp = document.getElementById('tag-input');
  const val = inp.value.trim();
  if (!val || itemTags.includes(val)) { inp.value = ''; return; }
  itemTags.push(val);
  inp.value = '';
  renderTagsWrap();
}

function removeTag(i) {
  itemTags.splice(i, 1);
  renderTagsWrap();
}

function tagKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); addTag(); }
}

// ── QR Code ───────────────────────────────────────────────────────────────────
function showQR(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  qrItemId = itemId;
  document.getElementById('qr-name').textContent = item.name;
  document.getElementById('qr-loc').textContent = item.location ? '⊹ ' + item.location : '';
  document.getElementById('qr-img').src = `/api/items/${itemId}/qr?t=${Date.now()}`;
  document.getElementById('qr-modal').classList.add('open');
}

function showQRFromPanel() {
  if (openItemId) showQR(openItemId);
}

function closeQR() {
  document.getElementById('qr-modal').classList.remove('open');
  qrItemId = null;
}

function printQRLabel() {
  const item = items.find(i => i.id === qrItemId);
  if (!item) return;
  const qrSrc = `/api/items/${qrItemId}/qr?t=${Date.now()}`;
  const win = window.open('', '_blank', 'width=400,height=500');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>CACHE Label — ${item.name}</title>
    <style>
      body{margin:0;padding:20px;font-family:monospace;background:#fff;color:#000;text-align:center}
      img{width:200px;height:200px;display:block;margin:0 auto 10px}
      .name{font-size:16px;font-weight:bold;letter-spacing:1px;margin-bottom:4px}
      .loc{font-size:11px;color:#555;margin-bottom:4px;letter-spacing:1px}
      .meta{font-size:10px;color:#888;letter-spacing:1px}
      @media print{body{padding:8px}}
    </style>
  </head><body>
    <img src="${qrSrc}" onload="window.print()" />
    <div class="name">${item.name}</div>
    ${item.location ? `<div class="loc">⊹ ${item.location}</div>` : ''}
    <div class="meta">${item.quantity} ${item.unit}${item.brand ? ' · ' + item.brand : ''}</div>
    <div class="meta" style="color:#aaa;font-size:9px;margin-top:6px">CACHE #${String(item.id).padStart(4,'0')}</div>
  </body></html>`);
  win.document.close();
}

// ── Scanner ───────────────────────────────────────────────────────────────────
async function openScanner() {
  const modal = document.getElementById('scanner-modal');
  const status = document.getElementById('scanner-status');
  modal.classList.add('open');
  status.textContent = 'STARTING CAMERA...';
  status.className = 'scanner-status';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    scannerStream = stream;
    const video = document.getElementById('scanner-video');
    video.srcObject = stream;
    await video.play();
    status.textContent = 'SCANNING...';

    const canvas = document.getElementById('scanner-canvas');
    const ctx = canvas.getContext('2d');

    function tick() {
      if (!scannerStream) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        if (typeof jsQR !== 'undefined') {
          const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
          if (code && code.data) {
            handleScanResult(code.data, status);
            return;
          }
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

  } catch (err) {
    status.textContent = 'CAMERA ACCESS DENIED';
    setTimeout(closeScanner, 1500);
  }
}

function closeScanner() {
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;
  document.getElementById('scanner-modal').classList.remove('open');
}

function handleScanResult(url, statusEl) {
  const match = url.match(/\/i\/([a-f0-9]+)$/);
  if (!match) {
    if (statusEl) { statusEl.textContent = 'NOT A CACHE CODE'; statusEl.className = 'scanner-status detected'; }
    setTimeout(() => { if (scannerStream) { statusEl.textContent = 'SCANNING...'; statusEl.className = 'scanner-status'; const video = document.getElementById('scanner-video'); const canvas = document.getElementById('scanner-canvas'); const ctx = canvas.getContext('2d'); function tick() { if (!scannerStream) return; if (video.readyState === video.HAVE_ENOUGH_DATA) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; ctx.drawImage(video, 0, 0); const id2 = ctx.getImageData(0, 0, canvas.width, canvas.height); const c2 = jsQR(id2.data, id2.width, id2.height, {inversionAttempts:'dontInvert'}); if (c2 && c2.data) { handleScanResult(c2.data, statusEl); return; } } requestAnimationFrame(tick); } requestAnimationFrame(tick); } }, 1500);
    return;
  }
  const token = match[1];
  const item = items.find(i => i.qr_token === token);
  closeScanner();
  if (item) {
    openPanel(item.id);
  } else {
    alert('Item not found in your inventory.');
  }
}

// ── Filter / Search ───────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
}

function setCatFilter(val) { currentCatFilter = val; renderGrid(); }
function setLocFilter(val) { currentLocFilter = val; renderGrid(); }
function setSort(val) { currentSort = val; renderGrid(); }

function setSearch(val) {
  currentSearch = val;
  document.getElementById('search-clear').style.display = val ? '' : 'none';
  renderGrid();
}

function clearSearch() {
  currentSearch = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderGrid();
}

// ── User modal ────────────────────────────────────────────────────────────────
function openUserModal() {
  document.getElementById('cur-pw').value = '';
  document.getElementById('new-pw').value = '';
  document.getElementById('pw-msg').textContent = '';
  document.getElementById('user-modal').classList.add('open');
}
function closeUserModal() { document.getElementById('user-modal').classList.remove('open'); }

async function changePassword() {
  const cur = document.getElementById('cur-pw').value;
  const nw  = document.getElementById('new-pw').value;
  const msg = document.getElementById('pw-msg');
  msg.textContent = '';
  if (!cur || !nw) { msg.textContent = 'Both fields required.'; msg.className = 'user-modal-msg err'; return; }
  try {
    await api('POST', '/api/account/password', { currentPassword: cur, newPassword: nw });
    msg.textContent = '✓ Password updated.';
    msg.className = 'user-modal-msg ok';
    document.getElementById('cur-pw').value = '';
    document.getElementById('new-pw').value = '';
  } catch (e) {
    msg.textContent = e.message;
    msg.className = 'user-modal-msg err';
  }
}

async function deleteAccount() {
  const pw = prompt('Enter your password to delete your account. ALL DATA WILL BE LOST.');
  if (!pw) return;
  try {
    await api('DELETE', '/api/account', { password: pw });
    token = '';
    localStorage.removeItem('cache_token');
    items = [];
    closeUserModal();
    showAuthScreen();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ── Export / Import ───────────────────────────────────────────────────────────
async function exportData() {
  try {
    const res = await fetch('/api/export', { headers: { Authorization: `Bearer ${token}` } });
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `cache-export-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  } catch (e) { alert('Export failed: ' + e.message); }
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const itemsToImport = data.items || (Array.isArray(data) ? data : []);
    if (!itemsToImport.length) { alert('No items found in file.'); return; }
    const result = await api('POST', '/api/import', { items: itemsToImport });
    alert(`Imported ${result.imported} items.`);
    await loadItems();
    closeUserModal();
  } catch (e) { alert('Import failed: ' + e.message); }
  input.value = '';
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('scanner-modal').classList.contains('open')) { closeScanner(); return; }
    if (document.getElementById('qr-modal').classList.contains('open')) { closeQR(); return; }
    if (document.getElementById('user-modal').classList.contains('open')) { closeUserModal(); return; }
    if (document.body.classList.contains('panel-open')) { closePanel(); return; }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && document.body.classList.contains('panel-open')) {
    e.preventDefault();
    saveItem();
  }
});

// ── Event delegation — item grid ──────────────────────────────────────────────
document.getElementById('item-grid').addEventListener('click', e => {
  if (e.target.closest('[data-qr-id]')) return; // QR button handled by onclick
  const card = e.target.closest('[data-card-id]');
  if (card) openPanel(Number(card.dataset.cardId));
});

document.getElementById('btn-close-panel').addEventListener('click', closePanel);

// Modal close on backdrop click
['qr-modal','scanner-modal','user-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === document.getElementById(id)) {
      if (id === 'scanner-modal') closeScanner();
      else if (id === 'qr-modal') closeQR();
      else closeUserModal();
    }
  });
});

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  if (!token) { showAuthScreen(); return; }

  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    currentUserEmail = payload.email || '';
  } catch {}

  showApp();
  await loadItems();
}

init();
</script>
